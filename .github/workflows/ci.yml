name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  repository-validation:
    name: Repository Validation
    runs-on: ubuntu-latest
    env:
      HOST_PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

  go-producer-tests:
    name: Go Producer Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-producer/go.mod

      - name: Run Go tests
        working-directory: go-producer
        run: go test ./...

  python-consumer-tests:
    name: Python Consumer Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python consumer dependencies
        working-directory: python-consumer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python consumer tests
        working-directory: python-consumer
        run: python -m pytest

  warehouse-loader-tests:
    name: Warehouse Loader Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install warehouse loader dependencies
        working-directory: warehouse-loader
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run warehouse loader tests
        working-directory: warehouse-loader
        run: python -m pytest
