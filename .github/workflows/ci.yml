name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  repository-validation:
    name: Repository Validation
    runs-on: ubuntu-latest
    env:
      HOST_PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

  go-producer-tests:
    name: Go Producer Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-producer/go.mod

      - name: Run Go tests
        working-directory: go-producer
        run: go test ./...

  python-consumer-tests:
    name: Python Consumer Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python consumer dependencies
        working-directory: python-consumer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python consumer tests
        working-directory: python-consumer
        run: python -m pytest

  warehouse-loader-tests:
    name: Warehouse Loader Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install warehouse loader dependencies
        working-directory: warehouse-loader
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run warehouse loader tests
        working-directory: warehouse-loader
        run: python -m pytest

  dbt-validation:
    name: dbt Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: iot_logs
          POSTGRES_USER: iot_user
          POSTGRES_PASSWORD: iot_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U iot_user -d iot_logs"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: iot_logs
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt dependencies
        working-directory: dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.10.22" "dbt-postgres==1.10.1"
          

      - name: Show dbt version
        run: dbt --version

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps --profiles-dir . || true

      - name: Parse dbt project
        working-directory: dbt
        run: dbt parse --profiles-dir .

      - name: Compile dbt project
        working-directory: dbt
        run: dbt compile --profiles-dir .

  airflow-dag-validation:
    name: Airflow DAG Validation
    runs-on: ubuntu-latest
    env:
      AIRFLOW_HOME: /tmp/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow_ci.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5"

      - name: Validate Airflow DAG syntax
        run: |
          python -m py_compile airflow/dags/iot_pipeline_smoke_dag.py
          python -m py_compile airflow/dags/iot_local_pipeline_dag.py

      - name: Validate Airflow DAG imports
        run: |
          python -c "from airflow.models import DagBag; import sys; dag_bag = DagBag(dag_folder='airflow/dags', include_examples=False); print(f'Loaded DAGs: {sorted(dag_bag.dags.keys())}'); print(f'Import errors: {dag_bag.import_errors}'); sys.exit(1 if dag_bag.import_errors else 0)"

      - name: Initialize Airflow metadata for CLI validation
        run: airflow db migrate

      - name: List Airflow DAGs
        run: airflow dags list --subdir airflow/dags
