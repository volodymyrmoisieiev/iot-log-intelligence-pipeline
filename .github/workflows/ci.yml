name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  ci-foundation:
    name: Stage 20A CI Foundation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print basic repository information
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Runner OS: $RUNNER_OS"
          echo "Workspace: $GITHUB_WORKSPACE"
          pwd
          ls -la

      - name: Verify expected project structure
        shell: bash
        run: |
          required_dirs=(
            "airflow"
            "dbt"
            "scripts"
            "infra/aws-orchestration"
            "aws/lambda/iot_metadata_validator"
            "docs"
          )

          required_files=(
            "README.md"
            "docker-compose.yml"
            ".github/workflows/ci.yml"
          )

          for dir in "${required_dirs[@]}"; do
            if [[ ! -d "$dir" ]]; then
              echo "::error title=Missing directory::$dir"
              exit 1
            fi

            echo "Found directory: $dir"
          done

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error title=Missing file::$file"
              exit 1
            fi

            echo "Found file: $file"
          done

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile lightweight Python entry points
        shell: bash
        run: |
          python_files=(
            "scripts/run_anomaly_detection.py"
            "scripts/validate_data_contract.py"
            "scripts/run_performance_benchmark.py"
            "scripts/analyze_performance_results.py"
            "aws/lambda/iot_metadata_validator/handler.py"
            "airflow/dags/iot_local_pipeline_dag.py"
          )

          compiled_any=0

          for file in "${python_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "Compiling $file"
              python -m py_compile "$file"
              compiled_any=1
            else
              echo "Skipping missing file: $file"
            fi
          done

          if [[ "$compiled_any" -eq 0 ]]; then
            echo "::warning title=No Python files compiled::No expected lightweight Python entry points were present."
          fi
