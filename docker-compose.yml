services:
  postgres:
    image: postgres:16
    container_name: iot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}/storage/postgres/init
        target: /docker-entrypoint-initdb.d
        read_only: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: apache/kafka:4.1.0
    container_name: iot-kafka
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.1.0
    container_name: iot-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -ec
    command:
      - |
        topics="iot_raw_logs iot_processed_logs iot_invalid_logs iot_pipeline_alerts"
        for topic in $$topics; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1
        done

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: iot-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  go-producer:
    build:
      context: ./go-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-iot_raw_logs}
      PRODUCER_INPUT_FILE: ${PRODUCER_INPUT_FILE:-/app/data/samples/sample_iot_logs.csv}
      PRODUCER_SEND_DELAY_MS: ${PRODUCER_SEND_DELAY_MS:-250}
    profiles:
      - producer
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}/data
        target: /app/data
        read_only: true

  python-consumer:
    build:
      context: ./python-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-iot_raw_logs}
      KAFKA_PROCESSED_TOPIC: ${KAFKA_PROCESSED_TOPIC:-iot_processed_logs}
      KAFKA_INVALID_TOPIC: ${KAFKA_INVALID_TOPIC:-iot_invalid_logs}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID:-iot-python-consumer}
      CONSUMER_MAX_MESSAGES: ${CONSUMER_MAX_MESSAGES:-0}
      CONSUMER_IDLE_TIMEOUT_SECONDS: ${CONSUMER_IDLE_TIMEOUT_SECONDS:-10}
    profiles:
      - consumer

  warehouse-loader:
    build:
      context: ./warehouse-loader
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_PROCESSED_TOPIC: ${KAFKA_PROCESSED_TOPIC:-iot_processed_logs}
      KAFKA_INVALID_TOPIC: ${KAFKA_INVALID_TOPIC:-iot_invalid_logs}
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      WAREHOUSE_LOADER_GROUP_ID: ${WAREHOUSE_LOADER_GROUP_ID:-iot-warehouse-loader}
      WAREHOUSE_LOADER_MAX_MESSAGES: ${WAREHOUSE_LOADER_MAX_MESSAGES:-0}
      WAREHOUSE_LOADER_IDLE_TIMEOUT_SECONDS: ${WAREHOUSE_LOADER_IDLE_TIMEOUT_SECONDS:-10}
    profiles:
      - storage

  observability-writer:
    build:
      context: ./observability
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_ALERT_TOPIC: ${KAFKA_ALERT_TOPIC:-iot_pipeline_alerts}

  dbt:
    build:
      context: ./dbt
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR:-/usr/app/dbt}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}/dbt
        target: /usr/app/dbt
    profiles:
      - analytics

  streamlit-dashboard:
    build:
      context: ./dashboard
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
    profiles:
      - dashboard

  spark-batch:
    build:
      context: ./spark
    container_name: iot-spark-batch
    command: python /app/jobs/smoke_job.py
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}/spark/jobs
        target: /app/jobs
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}/data
        target: /app/data
    profiles:
      - spark

  minio:
    image: minio/minio
    container_name: iot-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    profiles:
      - object-storage

  minio-init:
    image: minio/mc
    container_name: iot-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        until mc alias set local "$$MINIO_ENDPOINT" "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        mc ls "local/$$MINIO_BUCKET"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-iot-data-lake}
    profiles:
      - object-storage

  object-storage-uploader:
    build:
      context: ./object-storage
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-iot-data-lake}
      SPARK_FEATURES_LOCAL_PATH: ${SPARK_FEATURES_CONTAINER_PATH:-/workspace/data/processed/spark/device_features}
      SPARK_FEATURES_OBJECT_PREFIX: ${SPARK_FEATURES_OBJECT_PREFIX:-spark/device_features/latest}
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}
        target: /workspace
        read_only: true
    profiles:
      - object-storage

  airflow-postgres:
    image: postgres:16
    container_name: iot-airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  airflow-init:
    build:
      context: ./airflow
    container_name: iot-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    restart: "no"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW_UID: "50000"
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-C:/Users/User/Desktop/Cloud Technologies/IoT_Log_Intelligence_Pipeline}
    entrypoint:
      - /bin/bash
      - -ec
    command:
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email airflow@example.local \
          --password airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    build:
      context: ./airflow
    container_name: iot-airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    command: webserver
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: UTC
      AIRFLOW_UID: "50000"
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-C:/Users/User/Desktop/Cloud Technologies/IoT_Log_Intelligence_Pipeline}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://localhost:8080/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  airflow-scheduler:
    build:
      context: ./airflow
    container_name: iot-airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW_UID: "50000"
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-C:/Users/User/Desktop/Cloud Technologies/IoT_Log_Intelligence_Pipeline}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  airflow_postgres_data:
  minio_data:
