services:
  postgres:
    image: postgres:16
    container_name: iot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: apache/kafka:4.1.0
    container_name: iot-kafka
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.1.0
    container_name: iot-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -ec
    command:
      - |
        topics="iot_raw_logs iot_processed_logs iot_invalid_logs iot_pipeline_alerts"
        for topic in $$topics; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1
        done

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: iot-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  go-producer:
    build:
      context: ./go-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-iot_raw_logs}
      PRODUCER_INPUT_FILE: ${PRODUCER_INPUT_FILE:-/app/data/samples/sample_iot_logs.csv}
      PRODUCER_SEND_DELAY_MS: ${PRODUCER_SEND_DELAY_MS:-250}
    profiles:
      - producer
    volumes:
      - ./data:/app/data:ro

  python-consumer:
    build:
      context: ./python-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-iot_raw_logs}
      KAFKA_PROCESSED_TOPIC: ${KAFKA_PROCESSED_TOPIC:-iot_processed_logs}
      KAFKA_INVALID_TOPIC: ${KAFKA_INVALID_TOPIC:-iot_invalid_logs}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID:-iot-python-consumer}
      CONSUMER_MAX_MESSAGES: ${CONSUMER_MAX_MESSAGES:-0}
      CONSUMER_IDLE_TIMEOUT_SECONDS: ${CONSUMER_IDLE_TIMEOUT_SECONDS:-10}
    profiles:
      - consumer

  warehouse-loader:
    build:
      context: ./warehouse-loader
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_PROCESSED_TOPIC: ${KAFKA_PROCESSED_TOPIC:-iot_processed_logs}
      KAFKA_INVALID_TOPIC: ${KAFKA_INVALID_TOPIC:-iot_invalid_logs}
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      WAREHOUSE_LOADER_GROUP_ID: ${WAREHOUSE_LOADER_GROUP_ID:-iot-warehouse-loader}
      WAREHOUSE_LOADER_MAX_MESSAGES: ${WAREHOUSE_LOADER_MAX_MESSAGES:-0}
      WAREHOUSE_LOADER_IDLE_TIMEOUT_SECONDS: ${WAREHOUSE_LOADER_IDLE_TIMEOUT_SECONDS:-10}
    profiles:
      - storage

  dbt:
    build:
      context: ./dbt
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR:-/usr/app/dbt}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-iot_logs}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_password}
    volumes:
      - ./dbt:/usr/app/dbt
    profiles:
      - analytics

volumes:
  postgres_data:
